name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'js/**'
      - 'css/**'
      - 'tests/**'
      - '*.html'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'js/**'
      - 'css/**'
      - 'tests/**'
      - '*.html'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-secrets:
    name: Check Secrets
    runs-on: ubuntu-latest
    outputs:
      has-codecov: ${{ steps.codecov-check.outputs.defined }}
    steps:
      - name: Check CODECOV_TOKEN
        id: codecov-check
        shell: bash
        run: |
          if [ "${{ secrets.CODECOV_TOKEN }}" != '' ]; then
            echo "defined=true" >> $GITHUB_OUTPUT
          else
            echo "defined=false" >> $GITHUB_OUTPUT
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run lint:html

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npm run format:check

  test:
    name: Test
    needs: [check-secrets]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npm run test:coverage

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() && matrix.node-version == 24 && needs.check-secrets.outputs.has-codecov == 'true' }}
        uses: codecov/codecov-action@v5
        with:
          directory: coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Codecov skip notice
        if: ${{ !cancelled() && matrix.node-version == 24 && needs.check-secrets.outputs.has-codecov != 'true' }}
        run: echo "::notice::Codecov upload skipped — CODECOV_TOKEN secret is not configured."
