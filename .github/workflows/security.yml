name: Security Scans

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-secrets:
    name: Check Secrets
    runs-on: ubuntu-latest
    outputs:
      has-snyk: ${{ steps.snyk-check.outputs.defined }}
    steps:
      - name: Check SNYK_TOKEN
        id: snyk-check
        shell: bash
        run: |
          if [ "${{ secrets.SNYK_TOKEN }}" != '' ]; then
            echo "defined=true" >> $GITHUB_OUTPUT
          else
            echo "defined=false" >> $GITHUB_OUTPUT
          fi

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  trivy:
    name: Trivy Scan
    if: ${{ vars.TRIVY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'
          format: table

  trivy-skip-notice:
    name: Trivy Skip Notice
    if: ${{ vars.TRIVY_ENABLED != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "::notice::Trivy scan skipped — TRIVY_ENABLED variable is not set to 'true'."

  snyk:
    name: Snyk Scan
    needs: [check-secrets]
    if: needs.check-secrets.outputs.has-snyk == 'true'
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Run Snyk test
        uses: snyk/actions/node@v1.0.0
        with:
          args: --severity-threshold=high --file=package.json

  snyk-skip-notice:
    name: Snyk Skip Notice
    needs: [check-secrets]
    if: needs.check-secrets.outputs.has-snyk != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "::notice::Snyk scan skipped — SNYK_TOKEN secret is not configured."

  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true
