name: qlty Code Quality

on:
  pull_request:
    branches: [main]
    paths:
      - 'lusk-cloud-landing-page/**'
      - '.github/workflows/qlty.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-secrets:
    name: Check Secrets
    runs-on: ubuntu-latest
    outputs:
      has-qlty: ${{ steps.qlty-check.outputs.defined }}
    steps:
      - name: Check QLTY_TOKEN
        id: qlty-check
        shell: bash
        run: |
          if [ "${{ secrets.QLTY_TOKEN }}" != '' ]; then
            echo "defined=true" >> $GITHUB_OUTPUT
          else
            echo "defined=false" >> $GITHUB_OUTPUT
          fi

  qlty:
    name: qlty Analysis
    needs: [check-secrets]
    if: needs.check-secrets.outputs.has-qlty == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: lusk-cloud-landing-page/package-lock.json

      - run: npm ci
        working-directory: lusk-cloud-landing-page

      - run: npm run test:coverage
        working-directory: lusk-cloud-landing-page

      - name: Install qlty CLI
        uses: qltysh/qlty-action/install@main

      - name: Upload coverage to qlty
        run: qlty coverage publish lusk-cloud-landing-page/coverage/lcov.info
        env:
          QLTY_COVERAGE_TOKEN: ${{ secrets.QLTY_TOKEN }}

  qlty-skip-notice:
    name: qlty Skip Notice
    needs: [check-secrets]
    if: needs.check-secrets.outputs.has-qlty != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "::notice::qlty code quality analysis skipped — QLTY_TOKEN secret is not configured."
